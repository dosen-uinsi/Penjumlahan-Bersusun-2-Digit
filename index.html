<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Edukasi Bersusun</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; background-color: #f1f5f9;
            font-family: 'Arial Rounded MT Bold', 'Nunito', sans-serif; padding: 20px;
        }

        /* --- JUDUL HALAMAN --- */
        .main-header { text-align: center; margin-bottom: 20px; }
        .main-header h1 {
            color: #1e293b; font-size: 30px; margin: 0 0 5px 0;
            text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .main-header p { color: #10b981; font-size: 16px; margin: 0; font-weight: bold; font-style: italic; }

        /* --- KONTROL PANEL UTAMA --- */
        .control-panel {
            background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;
            width: 100%; max-width: 440px; 
            margin-bottom: 20px; border-top: 5px solid #3b82f6;
        }

        /* Tab Mode */
        .tab-container { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 10px 5px; border: 2px solid #e2e8f0; background: #f8fafc;
            border-radius: 8px; font-weight: bold; font-size: 14px; color: #64748b; cursor: pointer; transition: 0.2s;
        }
        .tab-btn.active { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }

        /* Grup Input */
        .input-group { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 10px; }
        .input-group input {
            width: 80px; height: 45px; font-size: 20px; text-align: center;
            border: 2px solid #cbd5e1; border-radius: 8px; font-weight: bold;
        }
        
        select.level-select {
            width: 100%; padding: 10px; font-size: 16px; font-weight: bold; color: #1e293b;
            border: 2px solid #cbd5e1; border-radius: 8px; margin-bottom: 15px; cursor: pointer;
        }

        /* Tampilan Soal di Mode Latihan */
        .soal-display {
            font-size: 28px; font-weight: 900; color: #1e293b; background: #f1f5f9;
            padding: 10px; border-radius: 8px; margin-bottom: 15px;
            letter-spacing: 2px; border: 2px dashed #cbd5e1;
        }

        button {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px;
        }
        .btn-set { background: #10b981; color: white; }
        .btn-random { background: #8b5cf6; color: white; }
        .btn-custom { background: #f59e0b; color: white; }
        .btn-step { background: #3b82f6; color: white; margin-top: 15px; }
        button:hover { filter: brightness(0.9); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* Numpad */
        .numpad {
            display: none; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 15px;
        }
        .key {
            background: #e2e8f0; color: #1e293b; padding: 12px 0; border-radius: 8px;
            font-size: 20px; font-weight: bold; cursor: pointer; user-select: none; border: none;
            touch-action: manipulation; 
        }
        .key:active { background: #cbd5e1; }
        .key-del { background: #ef4444; color: white; }

        /* Pesan Info */
        .info-msg {
            margin-top: 15px; padding: 10px; border-radius: 8px; background: #fef3c7; 
            color: #b45309; font-weight: bold; font-size: 14px; display: none; line-height: 1.4;
        }

        /* --- PAPAN UTAMA --- */
        .calc-board {
            position: relative; width: 440px; height: 460px;
            background: #e64545; border-radius: 25px;
            box-shadow: inset 2px 2px 8px rgba(255,255,255,0.2), 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            transform-origin: top center; 
        }

        .label { position: absolute; top: 15px; font-size: 24px; font-weight: 800; color: #8b1e1e; z-index: 5; }
        .label-p { left: 155px; } .label-s { left: 335px; }

        .divider { position: absolute; top: 325px; left: 30px; width: 350px; height: 4px; background: #7a1818; border-radius: 2px; z-index: 2; }
        .plus-sign { position: absolute; top: 327px; left: 390px; transform: translateY(-50%); font-size: 55px; font-weight: 900; color: #6b1414; z-index: 2; line-height: 1; margin: 0; }

        /* Ukuran Kotak Standar */
        .box-base {
            position: absolute; width: 70px; height: 75px; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 44px; font-weight: 700; z-index: 3; transition: all 0.2s;
        }

        #top-carry-result { transition: none !important; }

        /* Kordinat */
        .white-box { background: #ffffff; color: #1e293b; box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        .pos-p1 { top: 145px; left: 130px; } .pos-s1 { top: 145px; left: 310px; }
        .pos-p2 { top: 235px; left: 130px; } .pos-s2 { top: 235px; left: 310px; }

        .res-pos-3 { top: 345px; left: 40px; }   
        .res-pos-2 { top: 345px; left: 130px; }  
        .res-pos-1 { top: 345px; left: 220px; }  
        .res-pos-0 { top: 345px; left: 310px; }  
        .top-carry-pos { top: 55px; left: 130px; }

        /* Gaya Kotak */
        .striped-box { background: repeating-linear-gradient(-45deg, #c53333, #c53333 8px, #b22b2b 8px, #b22b2b 16px); border: 1px solid #a42222; z-index: 1; }
        .striped-carry { background: repeating-linear-gradient(-45deg, #059669, #059669 8px, #047857 8px, #047857 16px); border: 1px solid #064e3b; }

        .result-box { background: #fbc02d; color: #451a03; opacity: 0; box-shadow: 0 0 20px rgba(251, 192, 45, 0.6); border: 2px solid #fde073; }
        .carry-box { background: #5bcf7a; color: #064e3b; font-size: 28px; opacity: 0; box-shadow: 0 0 15px rgba(91, 207, 122, 0.5); border: 2px solid #a7f3d0; }

        /* Kotak Interaktif Latihan */
        .input-slot {
            opacity: 1 !important; cursor: pointer;
            background: rgba(255, 255, 255, 0.8) !important; color: #1e293b !important;
            border: 3px dashed #64748b !important; box-shadow: none !important;
        }
        .active-slot {
            background: #ffffff !important; border: 4px solid #3b82f6 !important;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.8) !important; transform: scale(1.05);
        }

        /* --- SVG & ANIMASI --- */
        .track-svg { position: absolute; top: 0; left: 0; z-index: 0; }
        
        .track-dashed {
            stroke-dasharray: 10 15;
            animation: moving-dash 0.8s linear infinite;
        }
        @keyframes moving-dash {
            from { stroke-dashoffset: 25; }
            to { stroke-dashoffset: 0; }
        }

        .moving-carry {
            position: absolute; top: 0; left: 0; width: 70px; height: 75px; background: #5bcf7a; color: #064e3b; font-size: 28px; font-weight: 700;
            border-radius: 15px; display: none; justify-content: center; align-items: center; box-shadow: 0 0 20px #5bcf7a; border: 2px solid #a7f3d0; z-index: 10;
            offset-path: path("M 255 382.5 L 255 140 Q 255 92.5 210 92.5 L 165 92.5"); offset-rotate: 0deg; 
        }
        @keyframes followPath { 0% { offset-distance: 0%; } 100% { offset-distance: 100%; } }

        /* ========================================= */
        /* PENGATURAN RESPONSIF                      */
        /* ========================================= */
        
        @media (max-width: 480px) {
            body { padding: 10px; }
            .main-header h1 { font-size: 24px; }
            .calc-board { transform: scale(0.85); margin-bottom: -69px; }
        }

        @media (max-width: 400px) {
            .tab-btn { font-size: 12px; padding: 10px 2px; }
            .calc-board { transform: scale(0.75); margin-bottom: -115px; }
            .key { font-size: 18px; padding: 10px 0; }
        }

        @media (max-width: 340px) {
            .calc-board { transform: scale(0.65); margin-bottom: -161px; }
        }
    </style>
</head>
<body>

    <div class="main-header">
        <h1>Penjumlahan Bersusun</h1>
        <p>By Mathnology</p>
    </div>

    <div class="control-panel">
        <div class="tab-container">
            <div class="tab-btn active" id="tab-belajar" onclick="switchMode('belajar')">📖 Belajar</div>
            <div class="tab-btn" id="tab-latihan" onclick="switchMode('latihan')">🎲 Latihan</div>
            <div class="tab-btn" id="tab-mandiri" onclick="switchMode('mandiri')">✍️ Mandiri</div>
        </div>

        <div id="section-belajar">
            <div class="input-group">
                <input type="number" id="in1-b" value="85" max="99">
                <span style="font-size: 24px; font-weight: bold;">+</span>
                <input type="number" id="in2-b" value="47" max="99">
            </div>
            <button class="btn-set" onclick="setSoalBelajar()">Mulai Mode Belajar</button>
        </div>

        <div id="section-latihan" style="display: none;">
            <select class="level-select" id="latihan-type" onchange="generateRandomSoal()">
                <option value="2d2d">Operasi: 2 Digit + 2 Digit</option>
                <option value="2d1d">Operasi: 2 Digit + 1 Digit</option>
            </select>
            <div class="soal-display" id="latihan-soal-text">-- + -- = ?</div>
            <button class="btn-random" onclick="generateRandomSoal()">Mulai Soal Acak Baru</button>
        </div>

        <div id="section-mandiri" style="display: none;">
            <p style="margin: 0 0 10px 0; font-size: 14px; color:#64748b;">Ketik soalmu sendiri, lalu kerjakan!</p>
            <div class="input-group">
                <input type="number" id="in1-m" value="73" max="99">
                <span style="font-size: 24px; font-weight: bold;">+</span>
                <input type="number" id="in2-m" value="8" max="99">
            </div>
            <button class="btn-custom" onclick="setSoalMandiri()">Mulai Kerjakan Soal Ini</button>
        </div>

        <div class="numpad" id="numpad-ui">
            <button class="key" onclick="pressKey(1)">1</button>
            <button class="key" onclick="pressKey(2)">2</button>
            <button class="key" onclick="pressKey(3)">3</button>
            <button class="key" onclick="pressKey(4)">4</button>
            <button class="key" onclick="pressKey(5)">5</button>
            <button class="key" onclick="pressKey(6)">6</button>
            <button class="key" onclick="pressKey(7)">7</button>
            <button class="key" onclick="pressKey(8)">8</button>
            <button class="key" onclick="pressKey(9)">9</button>
            <button class="key" onclick="pressKey(0)">0</button>
            <button class="key key-del" style="grid-column: span 2;" onclick="pressDel()">Hapus</button>
        </div>

        <div class="info-msg" id="info-msg"></div>
        <button class="btn-step" id="btn-step" onclick="mainAction()">1. Jumlahkan Satuan (S)</button>
    </div>

    <div class="calc-board">
        <svg class="track-svg" width="440" height="460">
            <path d="M 255 360 L 255 140 Q 255 92.5 210 92.5 L 165 92.5" stroke="#b02c2c" stroke-width="45" fill="none" stroke-linecap="round"/>
            <path class="track-dashed" d="M 255 360 L 255 140 Q 255 92.5 210 92.5 L 165 92.5" stroke="#ffe642" stroke-width="6" fill="none" stroke-linecap="round" />
            <polygon points="175,82.5 155,92.5 175,102.5" fill="#ffe642" />
        </svg>

        <div class="label label-p">P</div>
        <div class="label label-s">S</div>
        <div class="divider"></div>
        <div class="plus-sign">+</div>

        <div class="box-base striped-box striped-carry top-carry-pos"></div>
        <div class="box-base carry-box top-carry-pos" id="top-carry-result"></div>

        <div class="box-base white-box pos-p1" id="d-p1"></div>
        <div class="box-base white-box pos-s1" id="d-s1"></div>
        <div class="box-base white-box pos-p2" id="d-p2"></div>
        <div class="box-base white-box pos-s2" id="d-s2"></div>

        <div class="box-base striped-box res-pos-3"></div>
        <div class="box-base striped-box res-pos-2"></div>
        <div class="box-base striped-box striped-carry res-pos-1"></div>
        <div class="box-base striped-box res-pos-0"></div>

        <div class="box-base result-box res-pos-3" id="res-ratusan" onclick="selectBox('res-ratusan')"></div>
        <div class="box-base result-box res-pos-2" id="res-puluhan" onclick="selectBox('res-puluhan')"></div>
        <div class="box-base carry-box res-pos-1" id="res-carry" onclick="selectBox('res-carry')"></div>
        <div class="box-base result-box res-pos-0" id="res-satuan" onclick="selectBox('res-satuan')"></div>

        <div class="moving-carry" id="anim-carry"></div>
    </div>

    <script>
        let currentMode = 'belajar';
        let s1=0, s2=0, p1=0, p2=0;
        let step = 0; 
        let cValue = 0;
        let activeBoxId = null;

        const boxes = ['res-satuan', 'res-carry', 'res-puluhan', 'res-ratusan'];

        function showMsg(text, isSuccess = false) {
            const msg = document.getElementById('info-msg');
            msg.style.display = 'block';
            msg.innerHTML = text;
            msg.style.background = isSuccess ? '#dcfce7' : '#fef3c7';
            msg.style.color = isSuccess ? '#166534' : '#b45309';
        }
        function hideMsg() { document.getElementById('info-msg').style.display = 'none'; }

        function switchMode(mode) {
            currentMode = mode;
            ['belajar', 'latihan', 'mandiri'].forEach(m => {
                document.getElementById(`tab-${m}`).classList.remove('active');
                document.getElementById(`section-${m}`).style.display = 'none';
            });
            
            document.getElementById(`tab-${mode}`).classList.add('active');
            document.getElementById(`section-${mode}`).style.display = 'block';
            document.getElementById('numpad-ui').style.display = 'none';
            
            if(mode === 'belajar') { hideMsg(); setSoalBelajar(); } 
            else if(mode === 'latihan') { generateRandomSoal(); }
            else if(mode === 'mandiri') { hideMsg(); setSoalMandiri(); }
        }

        function cleanBoard() {
            step = 0; cValue = 0; activeBoxId = null;
            boxes.forEach(id => {
                let el = document.getElementById(id);
                el.style.opacity = 0; el.innerText = "";
                el.className = el.className.replace(' input-slot', '').replace(' active-slot', '');
            });
            document.getElementById('top-carry-result').style.opacity = 0;
            document.getElementById('anim-carry').style.display = 'none';
            document.getElementById('btn-step').disabled = false;
        }

        function parseAndDraw(v1, v2) {
            p1 = Math.floor(v1/10); s1 = v1%10; 
            p2 = Math.floor(v2/10); s2 = v2%10;
            
            document.getElementById('d-p1').innerText = p1 > 0 ? p1 : ""; 
            document.getElementById('d-s1').innerText = s1;
            document.getElementById('d-p2').innerText = p2 > 0 ? p2 : ""; 
            document.getElementById('d-s2').innerText = s2;
        }

        function setSoalBelajar() {
            let v1 = parseInt(document.getElementById('in1-b').value) || 0;
            let v2 = parseInt(document.getElementById('in2-b').value) || 0;
            parseAndDraw(v1, v2);
            cleanBoard();
            document.getElementById('btn-step').innerText = "1. Jumlahkan Satuan (S)";
        }

        function actionBelajar() {
            const b = document.getElementById('btn-step');
            const rs = document.getElementById('res-satuan'), rc = document.getElementById('res-carry');
            const rp = document.getElementById('res-puluhan'), rr = document.getElementById('res-ratusan');
            const topCarry = document.getElementById('top-carry-result'), anim = document.getElementById('anim-carry');

            if(step === 0) {
                let sumS = s1 + s2; rs.innerText = sumS % 10; rs.style.opacity = 1; cValue = Math.floor(sumS/10);
                if(cValue > 0) { rc.innerText = "+" + cValue; rc.style.opacity = 1; b.innerText = "2. Pindahkan Simpanan"; step = 1; } 
                else { b.innerText = "2. Jumlahkan Puluhan (P)"; step = 2; }
            } 
            else if(step === 1) {
                rc.style.opacity = 0; anim.innerText = "+" + cValue; anim.style.display = 'flex'; anim.style.animation = 'none';
                void anim.offsetWidth; anim.style.animation = 'followPath 1.5s ease-in-out forwards';
                setTimeout(() => {
                    topCarry.innerText = "+" + cValue; topCarry.style.opacity = 1; anim.style.display = 'none';
                    b.innerText = "3. Jumlahkan Puluhan (P)"; step = 2;
                }, 1500);
            }
            else if(step === 2) {
                let sumP = p1 + p2 + cValue; rp.innerText = sumP % 10; rp.style.opacity = 1;
                if(sumP >= 10) { rr.innerText = Math.floor(sumP/10); rr.style.opacity = 1; }
                b.innerText = "Selesai (Ulangi)"; step = 3;
            } else { setSoalBelajar(); }
        }

        function generateRandomSoal() {
            let type = document.getElementById('latihan-type').value;
            let v1 = Math.floor(Math.random() * 90) + 10; 
            let v2 = (type === '2d1d') ? (Math.floor(Math.random() * 9) + 1) : (Math.floor(Math.random() * 90) + 10);
            
            // Perbarui Teks Soal di Panel
            document.getElementById('latihan-soal-text').innerText = v1 + " + " + v2 + " = ?";

            parseAndDraw(v1, v2);
            cleanBoard();
            startLatihanTahap1();
        }

        function setSoalMandiri() {
            let v1 = parseInt(document.getElementById('in1-m').value) || 0;
            let v2 = parseInt(document.getElementById('in2-m').value) || 0;
            parseAndDraw(v1, v2);
            cleanBoard();
            startLatihanTahap1();
        }

        function enableSlot(id) {
            let el = document.getElementById(id);
            el.classList.add('input-slot'); el.style.opacity = 1;
        }
        function selectBox(id) {
            if((currentMode !== 'latihan' && currentMode !== 'mandiri') || !document.getElementById(id).classList.contains('input-slot')) return;
            boxes.forEach(b => document.getElementById(b).classList.remove('active-slot'));
            activeBoxId = id;
            document.getElementById(id).classList.add('active-slot');
        }

        function pressKey(num) {
            if(activeBoxId) {
                let el = document.getElementById(activeBoxId);
                el.innerText = (activeBoxId === 'res-carry' || activeBoxId === 'top-carry-result') ? "+" + num : num;
            }
        }
        function pressDel() { if(activeBoxId) document.getElementById(activeBoxId).innerText = ""; }

        function startLatihanTahap1() {
            step = 1;
            document.getElementById('numpad-ui').style.display = 'grid';
            showMsg("<b>Tahap 1:</b> Ketuk dan isi hasil penjumlahan <b>Satuan</b>.<br>Isi juga kotak simpanan atas garis jika hasilnya > 9.");
            enableSlot('res-satuan'); enableSlot('res-carry');
            selectBox('res-satuan');
            document.getElementById('btn-step').innerText = "Cek Tahap 1";
        }

        function actionLatihanInteraktif() {
            if(step === 1) { 
                let userS = parseInt(document.getElementById('res-satuan').innerText) || 0;
                let userCText = document.getElementById('res-carry').innerText.replace('+','');
                let userC = parseInt(userCText) || 0;
                
                let actualS = (s1+s2)%10;
                let actualC = Math.floor((s1+s2)/10);

                if(userS === actualS && userC === actualC) {
                    showMsg("Benar! Sekarang klik tombol untuk memindahkan simpanan ke atas.", true);
                    cValue = actualC;
                    document.getElementById('res-satuan').classList.remove('input-slot', 'active-slot');
                    document.getElementById('res-carry').classList.remove('input-slot', 'active-slot');
                    document.getElementById('numpad-ui').style.display = 'none';
                    document.getElementById('btn-step').innerText = "2. Pindahkan Simpanan";
                    step = 2;
                } else {
                    showMsg("Jawaban Tahap 1 belum tepat. Periksa kembali penjumlahan satuan dan simpanannya.");
                }
            }
            else if(step === 2) { 
                if(cValue > 0) {
                    document.getElementById('btn-step').disabled = true;
                    hideMsg();
                    const rc = document.getElementById('res-carry'), anim = document.getElementById('anim-carry'), topCarry = document.getElementById('top-carry-result');
                    rc.style.opacity = 0; anim.innerText = "+" + cValue; anim.style.display = 'flex'; anim.style.animation = 'none';
                    void anim.offsetWidth; anim.style.animation = 'followPath 1.5s ease-in-out forwards';
                    setTimeout(() => {
                        topCarry.innerText = "+" + cValue; topCarry.style.opacity = 1; anim.style.display = 'none';
                        document.getElementById('btn-step').disabled = false;
                        startLatihanTahap3();
                    }, 1500);
                } else {
                    startLatihanTahap3(); 
                }
            }
            else if(step === 3) { 
                let userP = parseInt(document.getElementById('res-puluhan').innerText) || 0;
                let userR = parseInt(document.getElementById('res-ratusan').innerText) || 0;
                
                let sumP = p1 + p2 + cValue;
                let actualP = sumP % 10;
                let actualR = Math.floor(sumP/10);

                if(userP === actualP && userR === actualR) {
                    showMsg("Luar Biasa! Jawaban Akhir Benar 👍", true);
                    document.getElementById('res-puluhan').classList.remove('input-slot', 'active-slot');
                    document.getElementById('res-ratusan').classList.remove('input-slot', 'active-slot');
                    document.getElementById('numpad-ui').style.display = 'none';
                    
                    if(currentMode === 'latihan') {
                        document.getElementById('btn-step').innerText = "Selesai! Buat Soal Acak Baru";
                    } else {
                        document.getElementById('btn-step').innerText = "Selesai! Reset Papan";
                    }
                    step = 4;
                } else {
                    showMsg("Jawaban Tahap 3 belum tepat. Jangan lupa tambahkan simpanan (jika ada).");
                }
            }
            else if(step === 4) { 
                if(currentMode === 'latihan') generateRandomSoal(); 
                else setSoalMandiri(); 
            }
        }

        function startLatihanTahap3() {
            step = 3;
            document.getElementById('numpad-ui').style.display = 'grid';
            showMsg("<b>Tahap 3:</b> Ketuk dan isi hasil penjumlahan kolom <b>Puluhan</b> (gunakan kolom di sebelahnya jika hasilnya belasan).");
            enableSlot('res-puluhan'); enableSlot('res-ratusan');
            selectBox('res-puluhan');
            document.getElementById('btn-step').innerText = "Cek Jawaban Akhir";
        }

        function mainAction() {
            if(currentMode === 'belajar') actionBelajar();
            else actionLatihanInteraktif();
        }

        setSoalBelajar();
    </script>
</body>
</html>
